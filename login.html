<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — WinWithFred</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --dark: #111827; --surface: #1f2937; --muted: #6b7280;
      --light: #f9fafb; --white: #ffffff; --orange: #f97316;
      --orange-d: #ea6c0a; --orange-l: #fff7ed; --red: #ef4444;
      --green: #22c55e; --radius: 10px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    body { font-family: var(--font); background: var(--dark); min-height: 100vh; display: flex; flex-direction: column; }
    a { color: var(--orange); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Navbar */
    .navbar { background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.08); padding: 0 24px; }
    .navbar-inner { max-width: 1120px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .navbar-logo { font-size: 1.3rem; font-weight: 900; color: #fff; }
    .navbar-logo span { color: var(--orange); }

    /* Page layout */
    .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }

    /* Auth card */
    .auth-card {
      background: var(--white);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo .brand { font-size: 1.5rem; font-weight: 900; color: var(--dark); }
    .auth-logo .brand span { color: var(--orange); }
    .auth-logo p { color: var(--muted); font-size: 0.9rem; margin-top: 6px; }

    .tab-nav { display: flex; background: #f3f4f6; border-radius: 8px; padding: 4px; margin-bottom: 28px; }
    .tab-btn { flex: 1; padding: 9px; border: none; background: none; border-radius: 6px; font-weight: 600; font-size: 0.9rem; cursor: pointer; font-family: var(--font); color: var(--muted); transition: all 0.15s; }
    .tab-btn.active { background: var(--white); color: var(--dark); box-shadow: 0 1px 6px rgba(0,0,0,0.1); }

    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-weight: 600; font-size: 0.88rem; margin-bottom: 7px; color: var(--dark); }
    .form-input {
      width: 100%; padding: 12px 14px;
      border: 2px solid #e5e7eb; border-radius: var(--radius);
      font-size: 1rem; font-family: var(--font);
      color: var(--dark); background: var(--white);
      transition: border-color 0.15s; outline: none;
    }
    .form-input:focus { border-color: var(--orange); }

    .btn { display: block; width: 100%; padding: 13px; border-radius: var(--radius); font-weight: 700; font-size: 1rem; cursor: pointer; border: 2px solid transparent; transition: all 0.18s; font-family: var(--font); text-align: center; }
    .btn-primary { background: var(--orange); color: #fff; border-color: var(--orange); }
    .btn-primary:hover { background: var(--orange-d); border-color: var(--orange-d); }
    .btn-google { background: var(--white); color: var(--dark); border-color: #e5e7eb; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-google:hover { border-color: #d1d5db; background: #f9fafb; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--muted); font-size: 0.85rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }

    .error-msg { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; border-radius: var(--radius); padding: 11px 14px; font-size: 0.88rem; font-weight: 500; margin-bottom: 18px; display: none; }
    .success-msg { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; border-radius: var(--radius); padding: 11px 14px; font-size: 0.88rem; font-weight: 500; margin-bottom: 18px; display: none; }

    .back-link { text-align: center; margin-top: 20px; font-size: 0.88rem; color: var(--muted); }
    .back-link a { color: var(--orange); font-weight: 600; }

    /* Loading overlay */
    .loading-overlay { position: fixed; inset: 0; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 999; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(249,115,22,0.3); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Google icon SVG */
    .google-icon { width: 18px; height: 18px; }

    @media (max-width: 480px) { .auth-card { padding: 28px 20px; } }
  </style>
</head>
<body>

<!-- Loading overlay — shown briefly while checking if user is already logged in -->
<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
</div>

<!-- Navbar -->
<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-logo">Win<span>WithFred</span></a>
  </div>
</nav>

<!-- Page -->
<div class="page">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="brand">Win<span>WithFred</span></div>
      <p>Your goals. Your habits. Your progress — saved forever.</p>
    </div>

    <!-- Tabs -->
    <div class="tab-nav">
      <button class="tab-btn active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
      <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- Error / Success messages -->
    <div class="error-msg" id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>

    <!-- Google Sign In -->
    <button class="btn btn-google" id="btn-google" onclick="signInWithGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">or</div>

    <!-- Email/Password Form -->
    <form id="auth-form" onsubmit="handleSubmit(event)">
      <div class="form-group" id="name-group" style="display:none;">
        <label class="form-label">Your Name</label>
        <input id="input-name" class="form-input" type="text" placeholder="Freddy Owen" />
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input id="input-email" class="form-input" type="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input id="input-password" class="form-input" type="password" placeholder="At least 6 characters" required />
      </div>
      <button type="submit" class="btn btn-primary" id="submit-btn">Sign In →</button>
    </form>

    <div class="back-link">
      <a href="index.html">← Back to homepage</a>
    </div>

  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
  let mode = 'signin';

  // If already logged in, redirect away
  auth.onAuthStateChanged(user => {
    document.getElementById('loading-overlay').style.display = 'none';
    if (user) {
      const redirect = new URLSearchParams(window.location.search).get('redirect') || 'goal-tracker.html';
      window.location.href = redirect;
    }
  });

  function switchTab(newMode) {
    mode = newMode;
    document.getElementById('tab-signin').classList.toggle('active', mode === 'signin');
    document.getElementById('tab-signup').classList.toggle('active', mode === 'signup');
    document.getElementById('name-group').style.display = mode === 'signup' ? 'block' : 'none';
    document.getElementById('submit-btn').textContent = mode === 'signin' ? 'Sign In →' : 'Create Account →';
    clearMessages();
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('success-msg').style.display = 'none';
  }
  function showSuccess(msg) {
    const el = document.getElementById('success-msg');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('error-msg').style.display = 'none';
  }
  function clearMessages() {
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('success-msg').style.display = 'none';
  }

  function setLoading(loading) {
    const btn = document.getElementById('submit-btn');
    const googleBtn = document.getElementById('btn-google');
    btn.disabled = loading;
    googleBtn.disabled = loading;
    if (loading) {
      btn.textContent = 'Please wait...';
    } else {
      btn.textContent = mode === 'signin' ? 'Sign In →' : 'Create Account →';
    }
  }

  async function handleSubmit(e) {
    e.preventDefault();
    clearMessages();
    const email    = document.getElementById('input-email').value.trim();
    const password = document.getElementById('input-password').value;
    const name     = document.getElementById('input-name').value.trim();
    setLoading(true);
    try {
      if (mode === 'signup') {
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        if (name) await cred.user.updateProfile({ displayName: name });
        // Create user profile in Firestore
        await db.collection('users').doc(cred.user.uid).set({
          displayName: name || email,
          email,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        showSuccess('Account created! Taking you in...');
      } else {
        await auth.signInWithEmailAndPassword(email, password);
      }
      // onAuthStateChanged will handle redirect
    } catch (err) {
      setLoading(false);
      showError(friendlyError(err.code));
    }
  }

  async function signInWithGoogle() {
    clearMessages();
    setLoading(true);
    try {
      const result = await auth.signInWithPopup(googleProvider);
      // Save profile to Firestore (merge so we don't overwrite existing data)
      await db.collection('users').doc(result.user.uid).set({
        displayName: result.user.displayName,
        email: result.user.email,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
    } catch (err) {
      setLoading(false);
      showError(friendlyError(err.code));
    }
  }

  function friendlyError(code) {
    const errors = {
      'auth/invalid-credential':    'Incorrect email or password. Try again.',
      'auth/user-not-found':        'No account found with that email.',
      'auth/wrong-password':        'Incorrect email or password. Try again.',
      'auth/email-already-in-use':  'An account with that email already exists. Sign in instead.',
      'auth/weak-password':         'Password must be at least 6 characters.',
      'auth/invalid-email':         'Please enter a valid email address.',
      'auth/too-many-requests':     'Too many attempts. Please wait a minute and try again.',
      'auth/popup-closed-by-user':  'Google sign-in was cancelled.',
      'auth/network-request-failed':'Network error. Check your connection.',
      'auth/operation-not-allowed': 'Email/password sign-in is not enabled. Contact support.',
    };
    return errors[code] || ('Something went wrong (' + code + '). Please try again.');
  }
</script>

<script src="mobile-nav.js"></script>
</body>
</html>
