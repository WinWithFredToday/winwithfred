name: Fix Blog Back Arrow
on:
  workflow_dispatch:
jobs:
  fix-arrow:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fix corrupted back arrow in all blog posts
        run: |
          python3 << 'PYEOF'
          import os
          fixed = 0
          BAD  = b'\xc3\xa2\xc2\x86\xc2\x90'
          GOOD = b'\xe2\x86\x90'
          for fname in os.listdir('.'):
            if not (fname.startswith('blog-') and fname.endswith('.html')):
              continue
            raw = open(fname, 'rb').read()
            if BAD in raw:
              open(fname, 'wb').write(raw.replace(BAD, GOOD))
              print(f'Fixed: {fname}')
              fixed += 1
          print(f'Total fixed: {fixed}')
          PYEOF
      - name: Commit fixes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add blog-*.html
          git diff --staged --stat
          git commit -m "Fix corrupted back arrow in blog posts" || echo "Nothing to commit"
          git push
