name: Fix Blog Back Arrow
on:
  workflow_dispatch:
jobs:
  fix-arrow:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fix corrupted back arrow in all blog posts
        run: |
          python3 << 'PYEOF'
          import os
          fixed = 0
          for fname in os.listdir('.'):
            if not (fname.startswith('blog-') and fname.endswith('.html')):
              continue
            with open(fname, 'r', encoding='utf-8') as f:
              content = f.read()
            original = content
            # Corrupted pattern: e2 86 90 (UTF-8 for ←) double-encoded as latin-1 then UTF-8
            # Results in Python string: U+00E2 + U+0086 + U+0090 before " Back to Blog"
            content = content.replace('\u00e2\u0086\u0090 Back to Blog', '\u2190 Back to Blog')
            if content != original:
              with open(fname, 'w', encoding='utf-8') as f:
                f.write(content)
              print(f'Fixed: {fname}')
              fixed += 1
          print(f'Total fixed: {fixed}')
          PYEOF
      - name: Commit fixes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add blog-*.html
          git diff --staged --stat
          git commit -m "Fix corrupted back arrow in blog posts" || echo "Nothing to commit"
          git push
