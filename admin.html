<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin — WinWithFred</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f0f0f;color:#e0e0e0;height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;font-family:inherit}
#login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:#0f0f0f}
#login-box{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:48px 40px;width:400px;text-align:center}
#login-box h1{font-size:1.5rem;font-weight:700;color:#f5a623;margin-bottom:8px}
#login-box p{color:#888;margin-bottom:28px;font-size:.9rem}
#login-box input{width:100%;padding:12px 16px;background:#111;border:1px solid #333;border-radius:8px;color:#e0e0e0;font-size:.95rem;margin-bottom:12px}
#login-box input:focus{outline:none;border-color:#f5a623}
#login-box .login-btn{width:100%;padding:12px;background:#f5a623;color:#000;font-weight:700;border-radius:8px;font-size:1rem;transition:opacity .2s}
#login-box .login-btn:hover{opacity:.85}
#login-error{color:#e74c3c;font-size:.85rem;margin-top:8px;display:none}
#app{display:none;flex:1;overflow:hidden;flex-direction:row}
#sidebar{width:220px;background:#141414;border-right:1px solid #222;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid #222;font-weight:700;font-size:1.05rem;color:#f5a623}
.sidebar-logo span{color:#e0e0e0;font-weight:400;font-size:.8rem;display:block;margin-top:2px}
#sidebar nav{flex:1;padding:12px 8px}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;background:none;color:#aaa;border-radius:8px;font-size:.9rem;text-align:left;transition:all .15s}
.nav-btn:hover{background:#1f1f1f;color:#e0e0e0}
.nav-btn.active{background:#f5a6231a;color:#f5a623;font-weight:600}
.nav-icon{font-size:1rem;width:20px;text-align:center}
.sidebar-footer{padding:12px 8px;border-top:1px solid #222}
.logout-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;background:none;color:#666;border-radius:8px;font-size:.85rem;text-align:left;transition:all .15s}
.logout-btn:hover{background:#1f1f1f;color:#e74c3c}
#main-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{padding:14px 24px;border-bottom:1px solid #222;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#topbar h2{font-size:1.1rem;font-weight:600}
#content{flex:1;overflow-y:auto;padding:24px}
#toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;font-size:.9rem;font-weight:500;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;z-index:9999}
#toast.show{opacity:1;transform:translateY(0)}
#toast.success{background:#27ae60;color:#fff}
#toast.error{background:#e74c3c;color:#fff}
#toast.info{background:#2980b9;color:#fff}
.posts-grid{display:grid;gap:10px}
.post-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .15s}
.post-card:hover{border-color:#f5a623;background:#1e1e1e}
.post-card-cat{padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;white-space:nowrap}
.cat-mindset{background:#3d2b7a;color:#c9b8ff}
.cat-habits{background:#1a4a2e;color:#7dd9a4}
.cat-goals{background:#4a2a1a;color:#f9c784}
.cat-productivity{background:#1a3a4a;color:#7dcbf9}
.cat-life-reset{background:#4a1a3a;color:#f97dcb}
.cat-faith{background:#4a3a1a;color:#f9e07d}
.cat-default{background:#2a2a2a;color:#aaa}
.post-card-title{flex:1;font-size:.92rem;font-weight:500;line-height:1.3}
.post-card-date{font-size:.78rem;color:#555;flex-shrink:0;white-space:nowrap}
.post-card-edit{padding:5px 12px;background:#f5a623;color:#000;border-radius:6px;font-size:.78rem;font-weight:600;flex-shrink:0;opacity:0;transition:opacity .15s}
.post-card:hover .post-card-edit{opacity:1}
.search-bar{display:flex;gap:10px;margin-bottom:14px}
.search-bar input{flex:1;padding:10px 14px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;color:#e0e0e0;font-size:.9rem}
.search-bar input:focus{outline:none;border-color:#f5a623}
.filter-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.filter-tab{padding:5px 12px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:20px;font-size:.8rem;color:#888;cursor:pointer;transition:all .15s}
.filter-tab:hover,.filter-tab.active{background:#f5a6231a;border-color:#f5a623;color:#f5a623}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.form-group label{font-size:.78rem;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select,.form-group textarea{padding:10px 12px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;color:#e0e0e0;font-size:.9rem;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#f5a623}
.form-group select option{background:#1a1a1a}
.editor-toolbar{display:flex;gap:4px;padding:8px 0;border-bottom:1px solid #222;flex-wrap:wrap;margin-bottom:8px}
.tb-btn{padding:5px 10px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:5px;color:#ccc;font-size:.8rem;transition:all .15s}
.tb-btn:hover{background:#2a2a2a;color:#e0e0e0}
.tb-sep{width:1px;background:#2a2a2a;margin:0 4px;align-self:stretch}
.body-editor{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:16px;min-height:380px;font-size:.95rem;line-height:1.7;color:#e0e0e0;overflow-y:auto}
.body-editor:focus{outline:none;border-color:#f5a623}
.body-editor h2{font-size:1.25rem;color:#f5a623;margin:18px 0 8px;border-bottom:1px solid #222;padding-bottom:5px}
.body-editor h3{font-size:1.05rem;color:#e0e0e0;margin:14px 0 6px}
.body-editor p{margin-bottom:10px;color:#ccc}
.body-editor ul,.body-editor ol{margin:8px 0 10px 20px;color:#ccc}
.body-editor li{margin-bottom:3px}
.body-editor blockquote{border-left:3px solid #f5a623;padding:8px 16px;background:#1f1f1f;margin:10px 0;color:#aaa;font-style:italic;border-radius:0 6px 6px 0}
.body-editor a{color:#f5a623;text-decoration:underline}
.editor-actions{display:flex;gap:10px;margin-top:16px;align-items:center;flex-wrap:wrap}
.btn-primary{padding:10px 24px;background:#f5a623;color:#000;font-weight:700;border-radius:8px;font-size:.9rem;transition:opacity .2s}
.btn-primary:hover{opacity:.85}
.btn-secondary{padding:10px 20px;background:#1a1a1a;border:1px solid #333;color:#ccc;border-radius:8px;font-size:.9rem;transition:all .15s}
.btn-secondary:hover{border-color:#f5a623;color:#e0e0e0}
.btn-danger{padding:10px 20px;background:#1a1a1a;border:1px solid #333;color:#e74c3c;border-radius:8px;font-size:.9rem;transition:all .15s;margin-left:auto}
.btn-danger:hover{border-color:#e74c3c;background:#2a1a1a}
.save-status{font-size:.85rem;color:#666}
.index-table{width:100%;border-collapse:collapse}
.index-table th{padding:10px 14px;text-align:left;font-size:.78rem;color:#666;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #222}
.index-table td{padding:9px 14px;border-bottom:1px solid #1a1a1a;font-size:.86rem;vertical-align:middle}
.index-table tr:hover td{background:#161616}
.cat-badge{padding:2px 8px;border-radius:10px;font-size:.73rem;font-weight:600}
.idx-edit-btn{padding:4px 10px;border-radius:5px;font-size:.75rem;font-weight:600;background:#f5a6231a;color:#f5a623;border:1px solid #f5a62344;cursor:pointer;transition:all .15s}
.idx-edit-btn:hover{background:#f5a62333}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center}
#modal-overlay.show{display:flex}
#modal{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:28px;width:560px;max-height:90vh;overflow-y:auto}
#modal h3{font-size:1.05rem;font-weight:600;margin-bottom:20px;color:#f5a623}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:#555;font-size:.95rem;gap:10px}
.spinner{width:20px;height:20px;border:2px solid #333;border-top-color:#f5a623;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px 20px;color:#555}
.post-count{margin-bottom:8px;color:#555;font-size:.82rem}
</style>
</head>
<body>

<div id="login-wrap">
  <div id="login-box">
    <h1>WinWithFred</h1>
    <p>Enter your GitHub token to manage your site</p>
    <input id="token-input" type="password" placeholder="ghp_..." autocomplete="off">
    <button class="login-btn" onclick="doLogin()">Sign In &rarr;</button>
    <div id="login-error">Invalid token &mdash; please try again</div>
  </div>
</div>

<div id="app">
  <aside id="sidebar">
    <div class="sidebar-logo">WwF <span>Admin Panel</span></div>
    <nav>
      <button class="nav-btn active" id="nav-posts" onclick="showView('posts')">
        <span class="nav-icon">&#128221;</span><span>Blog Posts</span>
      </button>
      <button class="nav-btn" id="nav-index" onclick="showView('index')">
        <span class="nav-icon">&#128203;</span><span>Blog Index</span>
      </button>
      <button class="nav-btn" id="nav-new" onclick="showView('new')">
        <span class="nav-icon">&#9997;</span><span>New Post</span>
      </button>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="doLogout()">
        <span class="nav-icon">&#128682;</span><span>Sign Out</span>
      </button>
    </div>
  </aside>
  <div id="main-panel">
    <div id="topbar">
      <h2 id="topbar-title">Blog Posts</h2>
      <div id="topbar-actions"></div>
    </div>
    <div id="content">
      <div class="loading"><div class="spinner"></div> Loading...</div>
    </div>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal">
    <h3 id="modal-title"></h3>
    <div id="modal-body"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const REPO = 'WinWithFredToday/winwithfred';
let TOKEN = '';
let H = {};
let allPosts = [];
let currentFile = null;

const CATS = {
  mindset:{label:'Mindset',cls:'cat-mindset'},
  habits:{label:'Habits',cls:'cat-habits'},
  goals:{label:'Goals',cls:'cat-goals'},
  productivity:{label:'Productivity',cls:'cat-productivity'},
  'life-reset':{label:'Life Reset',cls:'cat-life-reset'},
  faith:{label:'Faith',cls:'cat-faith'}
};

window.addEventListener('load',()=>{
  TOKEN = localStorage.getItem('wwf_token')||'';
  if(TOKEN){H=mkH(TOKEN);showApp();}
});

function mkH(t){return{'Authorization':'token '+t,'Content-Type':'application/json'};}
document.getElementById('token-input').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

async function doLogin(){
  const t=document.getElementById('token-input').value.trim();
  if(!t)return;
  document.getElementById('login-error').style.display='none';
  try{
    const r=await fetch('https://api.github.com/repos/'+REPO,{headers:mkH(t)});
    if(!r.ok)throw new Error();
    TOKEN=t;H=mkH(t);
    localStorage.setItem('wwf_token',t);
    showApp();
  }catch(e){document.getElementById('login-error').style.display='block';}
}

function doLogout(){localStorage.removeItem('wwf_token');location.reload();}

function showApp(){
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('app').style.display='flex';
  showView('posts');
}

function showView(v){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+v).classList.add('active');
  if(v==='posts')renderPostsView();
  else if(v==='index')renderIndexView();
  else if(v==='new')renderNewView();
}

function setTopbar(title,actions=''){
  document.getElementById('topbar-title').textContent=title;
  document.getElementById('topbar-actions').innerHTML=actions;
}
function setContent(html){document.getElementById('content').innerHTML=html;}

// ── POSTS VIEW ──────────────────────────────────────────
async function renderPostsView(){
  setTopbar('Blog Posts');
  setContent('<div class="loading"><div class="spinner"></div> Loading posts...</div>');
  try{
    if(!allPosts.length)await loadPosts();
    drawPosts('','');
  }catch(e){setContent('<div class="empty-state">Failed to load posts. Check your token.</div>');}
}

async function loadPosts(){
  const r=await fetch('https://api.github.com/repos/'+REPO+'/contents/',{headers:H});
  const files=await r.json();
  allPosts=files.filter(f=>f.name.startsWith('blog-')&&f.name.endsWith('.html'))
               .sort((a,b)=>b.name.localeCompare(a.name));
  // Load metadata in batches of 8
  for(let i=0;i<allPosts.length;i+=8){
    const batch=allPosts.slice(i,i+8);
    await Promise.all(batch.map(async p=>{
      try{
        const r2=await fetch('https://api.github.com/repos/'+REPO+'/contents/'+p.name,{headers:H});
        const d=await r2.json();
        const html=decB64(d.content);
        p.sha=d.sha; p.html=html;
        const doc=new DOMParser().parseFromString(html,'text/html');
        p.title=doc.querySelector('h1')?.textContent?.trim()||p.name;
        p.cat=doc.querySelector('.blog-tag')?.textContent?.trim()||'';
        p.meta=doc.querySelector('meta[name="description"]')?.getAttribute('content')||'';
        const mt=doc.querySelector('.post-meta')?.textContent?.replace(/\s+/g,' ').trim()||'';
        const dm=mt.match(/([A-Z][a-z]+ \d+,? \d{4})/);
        p.date=dm?dm[1]:'';
      }catch(e){p.title=p.name;}
    }));
  }
}

function drawPosts(q,cat){
  q=(document.getElementById('srch')?.value||'').toLowerCase();
  cat=document.getElementById('fcat')?.value||'';
  const filtered=allPosts.filter(p=>{
    const mq=!q||(p.title||'').toLowerCase().includes(q)||p.name.includes(q);
    const mc=!cat||p.cat?.toLowerCase()===cat||(p.cat||'').toLowerCase().replace(/\s+/g,'-')===cat;
    return mq&&mc;
  });
  const tabs=['','mindset','habits','goals','productivity','life-reset','faith'].map(c=>{
    const lbl=c?(CATS[c]?.label||c):'All';
    return `<button class="filter-tab ${cat===c?'active':''}" onclick="filterCat('${c}')">${lbl}</button>`;
  }).join('');
  const cards=filtered.map(p=>{
    const ci=Object.values(CATS).find(v=>v.label.toLowerCase()===(p.cat||'').toLowerCase())||{label:p.cat||'',cls:'cat-default'};
    return `<div class="post-card" onclick="openEditor('${p.name}')">
      <span class="post-card-cat ${ci.cls}">${ci.label||p.cat||'&mdash;'}</span>
      <span class="post-card-title">${esc(p.title||p.name)}</span>
      <span class="post-card-date">${p.date||''}</span>
      <span class="post-card-edit">Edit &rarr;</span>
    </div>`;
  }).join('');
  setContent(`
    <div class="post-count">${filtered.length} of ${allPosts.length} posts</div>
    <div class="search-bar"><input id="srch" type="text" placeholder="Search posts..." value="${esc(q)}" oninput="drawPosts()"></div>
    <div class="filter-tabs">${tabs}<input type="hidden" id="fcat" value="${cat}"></div>
    <div class="posts-grid">${cards||'<div class="empty-state">No posts found.</div>'}</div>
  `);
}

function filterCat(c){document.getElementById('fcat').value=c;drawPosts();}

// ── EDITOR ──────────────────────────────────────────────
async function openEditor(name){
  setTopbar('Loading...');
  setContent('<div class="loading"><div class="spinner"></div> Loading...</div>');
  try{
    const p=allPosts.find(x=>x.name===name)||{name};
    let html=p.html,sha=p.sha;
    if(!html){
      const r=await fetch('https://api.github.com/repos/'+REPO+'/contents/'+name,{headers:H});
      const d=await r.json();
      html=decB64(d.content);sha=d.sha;
    }
    currentFile={name,sha,html};
    const doc=new DOMParser().parseFromString(html,'text/html');
    const title=doc.querySelector('h1')?.textContent?.trim()||'';
    const cat=doc.querySelector('.blog-tag')?.textContent?.trim()||'Mindset';
    const meta=doc.querySelector('meta[name="description"]')?.getAttribute('content')||'';
    const body=doc.querySelector('article.post-body')?.innerHTML?.trim()||'';
    const mt=doc.querySelector('.post-meta')?.textContent?.replace(/\s+/g,' ').trim()||'';
    const dm=mt.match(/([A-Z][a-z]+ \d+,? \d{4})/);
    const date=dm?dm[1]:'';
    const catOpts=Object.entries(CATS).map(([k,v])=>`<option value="${v.label}" ${v.label===cat?'selected':''}>${v.label}</option>`).join('');
    setTopbar(title.slice(0,45)+(title.length>45?'...':''),`<button class="btn-secondary" onclick="showView('posts')">&larr; Back</button>`);
    setContent(`
      <div class="form-row">
        <div class="form-group"><label>Title</label><input id="e-title" type="text" value="${esc(title)}"></div>
        <div class="form-group"><label>Category</label><select id="e-cat">${catOpts}</select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Date</label><input id="e-date" type="text" value="${esc(date)}" placeholder="May 8, 2026"></div>
        <div class="form-group"><label>File</label><input type="text" value="${name}" readonly style="opacity:.4;cursor:default"></div>
      </div>
      <div class="form-group">
        <label>Meta Description <span id="mc" style="color:#555;font-weight:400;text-transform:none"></span></label>
        <textarea id="e-meta" rows="2" oninput="document.getElementById('mc').textContent=this.value.length+'/160'">${esc(meta)}</textarea>
      </div>
      <div class="form-group">
        <label>Post Body</label>
        <div class="editor-toolbar">
          <button class="tb-btn" onclick="fmt('bold')"><b>B</b></button>
          <button class="tb-btn" onclick="fmt('italic')"><i>I</i></button>
          <span class="tb-sep"></span>
          <button class="tb-btn" onclick="fmtB('h2')">H2</button>
          <button class="tb-btn" onclick="fmtB('h3')">H3</button>
          <button class="tb-btn" onclick="fmtB('p')">P</button>
          <span class="tb-sep"></span>
          <button class="tb-btn" onclick="fmt('insertUnorderedList')">&bull; List</button>
          <button class="tb-btn" onclick="fmtB('blockquote')">&ldquo; Quote</button>
          <span class="tb-sep"></span>
          <button class="tb-btn" onclick="insLink()">&#128279; Link</button>
          <button class="tb-btn" onclick="fmt('unlink')">&#9988; Unlink</button>
          <button class="tb-btn" onclick="previewPost()">&#128065; Preview</button>
        </div>
        <div id="e-body" class="body-editor" contenteditable="true" spellcheck="true">${body}</div>
      </div>
      <div class="editor-actions">
        <button class="btn-primary" onclick="savePost()">&nbsp;&#128190; Save &amp; Publish</button>
        <span id="sts" class="save-status"></span>
        <button class="btn-danger" onclick="showView('posts')">Cancel</button>
      </div>
    `);
    document.getElementById('mc').textContent=meta.length+'/160';
  }catch(e){showToast('Failed to load post','error');showView('posts');}
}

function fmt(c){document.getElementById('e-body')?.focus();document.execCommand(c,false,null);}
function fmtB(t){document.getElementById('e-body')?.focus();document.execCommand('formatBlock',false,t);}
function insLink(){const u=prompt('URL:','https://');if(u){document.getElementById('e-body')?.focus();document.execCommand('createLink',false,u);}}
function previewPost(){
  const t=document.getElementById('e-title')?.value||'';
  const b=document.getElementById('e-body')?.innerHTML||'';
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${esc(t)}</title>
  <style>body{font-family:Georgia,serif;max-width:720px;margin:40px auto;padding:0 20px;line-height:1.7;color:#222}
  h1{font-size:2rem}h2{font-size:1.4rem;margin-top:24px;color:#333}blockquote{border-left:3px solid #f5a623;padding:8px 16px;background:#fffdf0;margin:12px 0}a{color:#c47d00}</style>
  </head><body><h1>${esc(t)}</h1><hr style="margin:16px 0">${b}</body></html>`);
}

async function savePost(){
  const title=document.getElementById('e-title').value.trim();
  const cat=document.getElementById('e-cat').value;
  const date=document.getElementById('e-date').value.trim();
  const meta=document.getElementById('e-meta').value.trim();
  const body=document.getElementById('e-body').innerHTML;
  if(!title){showToast('Title is required','error');return;}
  const sts=document.getElementById('sts');
  sts.textContent='Saving...';
  try{
    const r=await fetch('https://api.github.com/repos/'+REPO+'/contents/'+currentFile.name,{headers:H});
    const d=await r.json();
    let html=decB64(d.content);
    const doc=new DOMParser().parseFromString(html,'text/html');
    const h1=doc.querySelector('h1');if(h1)h1.textContent=title;
    const og=doc.querySelector('meta[property="og:title"]');if(og)og.setAttribute('content',title);
    const tt=doc.querySelector('title');if(tt)tt.textContent=title+' | WinWithFred';
    const tg=doc.querySelector('.blog-tag');if(tg)tg.textContent=cat;
    const md=doc.querySelector('meta[name="description"]');if(md)md.setAttribute('content',meta);
    const ogd=doc.querySelector('meta[property="og:description"]');if(ogd)ogd.setAttribute('content',meta);
    const pm=doc.querySelector('.post-meta');
    if(pm&&date)pm.innerHTML=pm.innerHTML.replace(/([A-Z][a-z]+ \d+,? \d{4})/,date);
    const ab=doc.querySelector('article.post-body');if(ab)ab.innerHTML=body;
    const newHTML='<!DOCTYPE html>\n'+doc.documentElement.outerHTML;
    const put=await fetch('https://api.github.com/repos/'+REPO+'/contents/'+currentFile.name,{
      method:'PUT',headers:H,
      body:JSON.stringify({message:'Update: '+title,content:encB64(newHTML),sha:d.sha})
    });
    if(!put.ok)throw new Error(await put.text());
    const pd=await put.json();
    // Update cache
    const cp=allPosts.find(p=>p.name===currentFile.name);
    if(cp){cp.title=title;cp.cat=cat;cp.date=date;cp.meta=meta;cp.html=newHTML;cp.sha=pd.content?.sha||d.sha;}
    sts.textContent='&#10003; Saved!';
    showToast('Saved and published!','success');
    setTimeout(()=>{if(sts)sts.textContent='';},3000);
  }catch(e){sts.textContent='Error';showToast('Save failed: '+e.message,'error');}
}

// ── BLOG INDEX ──────────────────────────────────────────
async function renderIndexView(){
  setTopbar('Blog Index');
  setContent('<div class="loading"><div class="spinner"></div> Loading index...</div>');
  try{
    const r=await fetch('https://api.github.com/repos/'+REPO+'/contents/blog.html',{headers:H});
    const d=await r.json();
    const html=decB64(d.content);
    window._idxSHA=d.sha; window._idxHTML=html;
    const doc=new DOMParser().parseFromString(html,'text/html');
    const cards=Array.from(doc.querySelectorAll('.blog-card'));
    window._idxCards=cards.map((c,i)=>({
      i,cat:c.getAttribute('data-category')||'',
      title:c.querySelector('.blog-card-title a')?.textContent?.trim()||'',
      slug:c.querySelector('.blog-card-title a')?.getAttribute('href')||'',
      excerpt:c.querySelector('.blog-card-excerpt')?.textContent?.trim()||'',
      meta:c.querySelector('.blog-card-meta')?.textContent?.trim()||''
    }));
    const rows=window._idxCards.map(c=>{
      const ci=CATS[c.cat]||{label:c.cat,cls:'cat-default'};
      return `<tr>
        <td><span class="cat-badge ${ci.cls}">${ci.label}</span></td>
        <td>${esc(c.title)}</td>
        <td style="color:#555;font-size:.8rem">${esc(c.slug)}</td>
        <td style="color:#555;font-size:.8rem">${esc(c.meta)}</td>
        <td><button class="idx-edit-btn" onclick="editCard(${c.i})">Edit</button></td>
      </tr>`;
    }).join('');
    setContent(`<div class="post-count">${cards.length} cards</div>
      <div style="overflow-x:auto"><table class="index-table">
        <thead><tr><th>Category</th><th>Title</th><th>URL Slug</th><th>Date / Read Time</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`);
  }catch(e){setContent('<div class="empty-state">Failed to load index.</div>');}
}

function editCard(i){
  const c=window._idxCards[i];
  const catOpts=Object.entries(CATS).map(([k,v])=>`<option value="${k}" ${k===c.cat?'selected':''}>${v.label}</option>`).join('');
  document.getElementById('modal-title').textContent='Edit Blog Card';
  document.getElementById('modal-body').innerHTML=`
    <div class="form-group"><label>Title</label><input id="ci-title" type="text" value="${esc(c.title)}"></div>
    <div class="form-row">
      <div class="form-group"><label>Category</label><select id="ci-cat">${catOpts}</select></div>
      <div class="form-group"><label>URL Slug</label><input id="ci-slug" type="text" value="${esc(c.slug)}"></div>
    </div>
    <div class="form-group"><label>Excerpt</label><textarea id="ci-exc" rows="3">${esc(c.excerpt)}</textarea></div>
    <div class="form-group"><label>Date &amp; Read Time</label><input id="ci-meta" type="text" value="${esc(c.meta)}"></div>`;
  document.getElementById('modal-actions').innerHTML=`
    <button class="btn-secondary" onclick="closeModal()">Cancel</button>
    <button class="btn-primary" onclick="saveCard(${i})">Save</button>`;
  showModal();
}

async function saveCard(i){
  const title=document.getElementById('ci-title').value.trim();
  const cat=document.getElementById('ci-cat').value;
  const slug=document.getElementById('ci-slug').value.trim();
  const exc=document.getElementById('ci-exc').value.trim();
  const meta=document.getElementById('ci-meta').value.trim();
  const lbl=CATS[cat]?.label||cat;
  closeModal();showToast('Saving...','info');
  try{
    const r=await fetch('https://api.github.com/repos/'+REPO+'/contents/blog.html',{headers:H});
    const d=await r.json();
    const html=decB64(d.content);
    const doc=new DOMParser().parseFromString(html,'text/html');
    const card=doc.querySelectorAll('.blog-card')[i];
    if(!card)throw new Error('Card not found');
    card.setAttribute('data-category',cat);
    const tg=card.querySelector('.blog-card-tag');if(tg)tg.textContent=lbl;
    const ta=card.querySelector('.blog-card-title a');if(ta){ta.textContent=title;ta.href=slug;}
    const ra=card.querySelector('.read-more');if(ra)ra.href=slug;
    const ex=card.querySelector('.blog-card-excerpt');if(ex)ex.textContent=exc;
    const me=card.querySelector('.blog-card-meta');if(me)me.innerHTML=meta.replace('·','&middot;');
    const newHTML='<!DOCTYPE html>\n'+doc.documentElement.outerHTML;
    const put=await fetch('https://api.github.com/repos/'+REPO+'/contents/blog.html',{
      method:'PUT',headers:H,
      body:JSON.stringify({message:'Update card: '+title,content:encB64(newHTML),sha:d.sha})
    });
    if(!put.ok)throw new Error(await put.text());
    await syncBlog(newHTML);
    showToast('Card updated!','success');
    renderIndexView();
  }catch(e){showToast('Failed: '+e.message,'error');}
}

async function syncBlog(html){
  try{
    const r=await fetch('https://api.github.com/repos/'+REPO+'/contents/blog',{headers:H});
    if(!r.ok)return;
    const d=await r.json();
    await fetch('https://api.github.com/repos/'+REPO+'/contents/blog',{
      method:'PUT',headers:H,
      body:JSON.stringify({message:'Sync blog',content:encB64(html),sha:d.sha})
    });
  }catch(e){}
}

function autoSlug(){
  const t=document.getElementById('n-title').value;
  document.getElementById('n-slug').value='blog-'+t.toLowerCase().replace(/[^a-z0-9\s-]/g,'').trim().replace(/\s+/g,'-').replace(/-+/g,'-');
}
function nfmt(c){document.getElementById('n-body')?.focus();document.execCommand(c,false,null);}
function nfmtB(t){document.getElementById('n-body')?.focus();document.execCommand('formatBlock',false,t);}
function nInsLink(){const u=prompt('URL:','https://');if(u){document.getElementById('n-body')?.focus();document.execCommand('createLink',false,u);}}

async function publishPost(){
  const title=document.getElementById('n-title').value.trim();
  const cat=document.getElementById('n-cat').value;
  const slug=document.getElementById('n-slug').value.trim();
  const date=document.getElementById('n-date').value.trim();
  const meta=document.getElementById('n-meta').value.trim();
  const time=document.getElementById('n-time').value||'6';
  const body=document.getElementById('n-body').innerHTML;
  const lbl=CATS[cat]?.label||cat;
  if(!title){showToast('Add a title','error');return;}
  if(!slug){showToast('Add a URL slug','error');return;}
  if(!meta){showToast('Add a meta description','error');return;}
  const sts=document.getElementById('nsts');
  sts.textContent='Publishing...';
  const url='https://winwithfred.com/'+slug;
  const filename=slug+'.html';
  const postHTML=makePostHTML(title,cat,lbl,slug,date,meta,time,body,url);
  try{
    let sha=null;
    try{const chk=await fetch('https://api.github.com/repos/'+REPO+'/contents/'+filename,{headers:H});
      if(chk.ok){const cd=await chk.json();sha=cd.sha;}}catch(e){}
    const body2={message:'Add post: '+title,content:encB64(postHTML)};
    if(sha)body2.sha=sha;
    const r=await fetch('https://api.github.com/repos/'+REPO+'/contents/'+filename,{method:'PUT',headers:H,body:JSON.stringify(body2)});
    if(!r.ok)throw new Error(await r.text());
    await addCard(title,cat,lbl,slug,date,time,meta);
    allPosts=[];
    sts.textContent='&#10003; Published!';
    showToast('"'+title+'" is live!','success');
    setTimeout(()=>showView('posts'),1800);
  }catch(e){sts.textContent='Error';showToast('Failed: '+e.message,'error');}
}

async function addCard(title,cat,lbl,slug,date,time,meta){
  const r=await fetch('https://api.github.com/repos/'+REPO+'/contents/blog.html',{headers:H});
  const d=await r.json();
  let html=decB64(d.content);
  const card=`\n      <div class="blog-card" data-category="${cat}">
        <div class="blog-card-body">
          <span class="blog-card-tag">${lbl}</span>
          <h2 class="blog-card-title"><a href="${slug}">${title}</a></h2>
          <p class="blog-card-excerpt">${meta}</p>
          <div class="blog-card-footer"><span class="blog-card-meta">${date} &middot; ${time} min</span><a href="${slug}" class="read-more">Read More &rarr;</a></div>
        </div>
      </div>`;
  const at=html.indexOf('<div class="blog-grid"');
  if(at===-1)throw new Error('blog-grid not found');
  const af=html.indexOf('>',at)+1;
  const newHTML=html.slice(0,af)+card+html.slice(af);
  const put=await fetch('https://api.github.com/repos/'+REPO+'/contents/blog.html',{method:'PUT',headers:H,body:JSON.stringify({message:'Add card: '+title,content:encB64(newHTML),sha:d.sha})});
  if(!put.ok)throw new Error('Failed to update blog index');
  await syncBlog(newHTML);
}

// ── MODAL ───────────────────────────────────────────────
function showModal(){document.getElementById('modal-overlay').classList.add('show');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show');}
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target.id==='modal-overlay')closeModal();});

// ── TOAST ───────────────────────────────────────────────
let _tt;
function showToast(msg,type='info'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='show '+type;
  clearTimeout(_tt);_tt=setTimeout(()=>t.className='',3500);
}

// ── UTILS ───────────────────────────────────────────────
function decB64(b){return decodeURIComponent(escape(atob(b.replace(/\n/g,''))));}
function encB64(s){return btoa(unescape(encodeURIComponent(s)));}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
