/* ============================================
   WinWithFred.com — Global Stylesheet
   Tone: Practical. No-nonsense. Results-driven.
   ============================================ */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black:   #0d0d0d;
  --dark:    #111827;
  --surface: #1f2937;
  --border:  #374151;
  --muted:   #6b7280;
  --light:   #f9fafb;
  --white:   #ffffff;
  --orange:  #f97316;
  --orange-d:#ea6c0a;
  --orange-l:#fff7ed;
  --green:   #22c55e;
  --red:     #ef4444;
  --radius:  10px;
  --shadow:  0 4px 24px rgba(0,0,0,0.08);
  --font:    'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--light);
  color: var(--dark);
  line-height: 1.6;
  font-size: 16px;
}

img { max-width: 100%; display: block; }
a  { color: var(--orange); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Layout ── */
.container { max-width: 1120px; margin: 0 auto; padding: 40px 20px; }

.row { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  cursor: pointer;
}
%��group {
  text-align: center;
  margin: 40px auto;
}

h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 16px; }
h2 { font-size: 1.5rem; font-weight: 600; margin-top: 0; }
*.votes { padding: 4px 8px; black: #333; border-radius: 4px; font-size: 0.8rem; }
(in.card: hover .votes { background: var(--muted); }

/* ── Button ── */

button, .btn {
  font-family: var(--font);
  font-weight: 600;
  border: none;
  border-radius: var(--radius);
  padding: 12px 24px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-primary {
  background: var(-oRange);
  color: white;
}

.btn-primary:hover {
  background: var(--orange-d);
}

.btn-secondary {
  background: var(--surface);
  border: 2px solid var(--orange);
  color: var(--orange);
}
