      { "@type": "Question", "name": "Where do I start when my life feels out of control?", "acceptedAnswer": { "@type": "Answer", "text": "Start with the basics. Sleep, food, and movement. When those three things are a mess, everything else suffers. You cannot think clearly, make good decisions, or take consistent action when your body is running on empty. Before you tackle goals and plans, spend one week getting your sleep on a schedule, eating at least two decent meals a day, and moving your body for 20 minutes. That foundation makes everything else easier." } },
      { "@type": "Question", "name": "How long does it take to get your life together?", "acceptedAnswer": { "@type": "Answer", "text": "You will start feeling different within two to three weeks if you are consistent. Real, lasting change takes three to six months. Most people overestimate how fast change happens and give up before they see results. The key is not speed. It is consistency. Small steps, done daily, will change your life faster than any big dramatic overhaul." } },
      { "@type": "Question", "name": "What if I have tried before and failed?", "acceptedAnswer": { "@type": "Answer", "text": "Trying and failing is not a character flaw. It usually means the approach was wrong, not that you are broken. Most people fail because they try to change too much too fast, they have no system, or they rely on motivation instead of habits. This time, pick one area, build one habit, and stay with it for 30 days before adding more. That is the approach that actually works." } },
      { "@type": "Question", "name": "Do I need to fix everything at once?", "acceptedAnswer": { "@type": "Answer", "text": "No, and trying to fix everything at once is one of the fastest ways to fix nothing. Focus beats breadth every time. Pick the one area of your life that is causing the most pain right now and start there. When that area improves, it creates energy and momentum that carries into every other area. One strong anchor pulls the whole ship." } }
    ]
