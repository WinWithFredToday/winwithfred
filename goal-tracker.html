<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goal Tracker — WinWithFred</title>
  <meta name="description" content="Set clear goals, track your progress, and hold yourself accountable." />
<style>
/* ============================================
   WinWithFred.com — Global Stylesheet
   Tone: Practical. No-nonsense. Results-driven.
   ============================================ */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

/* ── Reset & Base ── */
', *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black:   #0d0d0d;
  --dark:    #111827;
  --surface: #1f2937;
  --border:  #374151;
  --muted:   #6b7280;
  --light:   #f9fafb;
  --white:   #ffffff;
  --orange:  #f97316;
  --orange-d:#ea6c0a;
  --orange-l:#fff7ed;
  --green:   #22c55e;
  --red:     #ef4444;
  --radius:  10px;
  --shadow:  0 4px 24px rgba(0,0,0,0.08);
  --font:    'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--light);
  color: var(--dark);
  line-height: 1.6;
  font-size: 16px;
}

img { max-width: 100%; display: block; }
a  { color: var(--orange); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Layout ── */
.container { max-width: 1120px; margin: 0 auto; padding: 0 24px; }
.section    { padding: 80px 0; }
.section-sm { padding: 48px 0; }

/* ── Typography ── */
h1, h2, h3, h4 { line-height: 1.2; font-weight: 800; color: var(--dark); }
h1 { font-size: clamp(2rem, 5vw, 3.5rem); }
h2 { font-size: clamp(1.6rem, 3vw, 2.4rem); }
h3 { font-size: 1.3rem; }
p  { color: #374151; }

.text-orange { color: var(--orange); }
.text-muted  { color: var(--muted); font-size: 0.9rem; }
.text-center { text-align: center; }

/* ── Buttons ── */
.btn {
  display: inline-block;
  padding: 14px 28px;
  border-radius: var(--radius);
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.18s ease;
  font-family: var(--font);
  line-height: 1;
}
.btn-primary {
  background: var(--orange);
  color: var(--white);
  border-color: var(--orange);
}
.btn-primary:hover {
  background: var(--orange-d);
  border-color: var(--orange-d);
  text-decoration: none;
  transform: translateY(-1px);
}
.btn-outline {
  background: transparent;
  color: var(--orange);
  border-color: var(--orange);
}
.btn-outline:hover {
  background: var(--orange);
  color: var(--white);
  text-decoration: none;
}
.btn-dark {
  background: var(--dark);
  color: var(--white);
  border-color: var(--dark);
}
.btn-dark:hover {
  background: var(--surface);
  text-decoration: none;
  transform: translateY(-1px);
}
.btn-sm { padding: 10px 20px; font-size: 0.9rem; }
.btn-lg { padding: 18px 40px; font-size: 1.1rem; }
