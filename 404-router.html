<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading... | WinWithFred</title>
  <style>body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#0d1117;color:#fff;}</style>
  <script>
  (function() {
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;

    // If path has no file extension and is not root, serve .html content at clean URL
    if (path && path !== '/' && !path.match(/\.[^\/]+$/)) {
      fetch(path + '.html' + search)
        .then(function(resp) {
          if (!resp.ok) throw new Error('404');
          return resp.text();
        })
        .then(function(html) {
          // Replace document content while keeping the clean URL
          document.open();
          document.write(html);
          document.close();
          // Ensure address bar stays on clean URL (no .html)
          if (window.location.pathname.endsWith('.html')) {
            history.replaceState(null, document.title, path + search + hash);
          }
        })
        .catch(function() {
          // Genuine 404 - show error
          document.title = 'Page Not Found | WinWithFred';
          document.body.innerHTML =
            '<div style="text-align:center">' +
            '<h1 style="color:#fff;font-size:2rem;margin-bottom:12px">Page Not Found</h1>' +
            '<p style="color:#9ca3af;margin-bottom:24px">The page you\'re looking for doesn\'t exist.</p>' +
            '<a href="/" style="color:#e07b39;text-decoration:none;font-weight:600">\u2190 Back to Home</a>' +
            '</div>';
        });
    }
  })();
  </script>
  <meta name="robots" content="noindex, nofollow">
</head>
<body>
  <div>
    <p style="color:#9ca3af;font-size:1rem">Loading\u2026</p>
  </div>
</body>
</html>
