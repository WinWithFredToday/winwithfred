<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading... | WinWithFred</title>
  <style>body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#0d1117;color:#fff;}</style>
  <script>
  (function() {
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;

    if (path && path !== '/' && !path.match(/\.[^\/]+$/)) {
      fetch(path + '.html' + search)
        .then(function(resp) {
          if (!resp.ok) throw new Error('404');
          return resp.text();
        })
        .then(function(html) {
          var parser = new DOMParser();
          var newDoc = parser.parseFromString(html, 'text/html');
          document.title = newDoc.title;
          var oldHead = document.head;
          while (oldHead.firstChild) { oldHead.removeChild(oldHead.firstChild); }
          Array.from(newDoc.head.childNodes).forEach(function(node) {
            oldHead.appendChild(document.importNode(node, true));
          });
          document.body.innerHTML = newDoc.body.innerHTML;
          Array.from(newDoc.body.attributes).forEach(function(attr) {
            document.body.setAttribute(attr.name, attr.value);
          });
          function reRunScripts(root) {
            Array.from(root.querySelectorAll('script')).forEach(function(old) {
              var s = document.createElement('script');
              Array.from(old.attributes).forEach(function(a) { s.setAttribute(a.name, a.value); });
              if (!old.src) s.textContent = old.textContent;
              old.parentNode.replaceChild(s, old);
            });
          }
          reRunScripts(document.head);
          reRunScripts(document.body);
          history.replaceState(null, document.title, path + search + hash);
        })
        .catch(function() {
          document.title = 'Page Not Found | WinWithFred';
          document.body.innerHTML =
            '<div style="text-align:center">' +
            '<h1 style="color:#fff;font-size:2rem;margin-bottom:12px">Page Not Found</h1>' +
            '<p style="color:#9ca3af;margin-bottom:24px">The page you\'re looking for doesn\'t exist.</p>' +
            '<a href="/" style="color:#e07b39;text-decoration:none;font-weight:600">\u2190 Back to Home</a>' +
            '</div>';
        });
    }
  })();
  </script>
</head>
<body>
  <div>
    <p style="color:#9ca3af;font-size:1rem">Loading…</p>
  </div>
</body>
</html>
