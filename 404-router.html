<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting... | WinWithFred</title>
<style>body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#f9f9f9;}</style>
<script>
(function() {
  var path = window.location.pathname;
  var search = window.location.search;
  var hash = window.location.hash;

  // If path has no file extension and is not root, redirect to .html version
  if (path && path !== '/' && !path.match(/\.[^\/]+$/)) {
    window.location.replace(path + '.html' + search + hash);
  }
  // Otherwise show a real 404
})();
</script>
</head>
<body>
<div>
  <h1 style="color:#333">Page Not Found</h1>
  <p>The page you're looking for doesn't exist.</p>
  <a href="/" style="color:#e07b39">← Back to Home</a>
</div>
</body>
</html>
